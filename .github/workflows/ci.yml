name: CI

# The GitHub repo root holds the project under myawardtracker/, so every
# run step is rooted there and path inputs are repo-root relative.

on:
  pull_request:
  push:
    branches-ignore: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: myawardtracker

jobs:
  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: myawardtracker/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build static export
        run: npm run build

  backend:
    name: Backend (compile check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: python -m pip install --requirement backend/requirements.txt

      - name: Compile-check sources
        run: python -m compileall -q backend/src

  terraform:
    name: Terraform (fmt + validate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.10.5

      - name: Format check
        run: terraform -chdir=infra fmt -check -recursive

      - name: Validate
        run: |
          terraform -chdir=infra init -backend=false
          terraform -chdir=infra validate

  # ---- SAST / security gates ---------------------------------------------

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sast-python:
    name: SAST (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install bandit
        run: python -m pip install 'bandit[toml]'

      - name: Run bandit
        run: bandit -r backend/src -ll

  sast-iac:
    name: SAST (checkov — Terraform)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: myawardtracker/infra
          framework: terraform
          quiet: true
          soft_fail: true

  dependency-audit:
    name: Dependency audit (npm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: npm audit
        run: npm audit --audit-level=critical
