name: DAST

# Dynamic scan of the live site. ZAP's baseline scan is passive (spider +
# passive rules only), so it is safe to point at production.

on:
  workflow_run:
    workflows: [Deploy]
    types: [completed]
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  zap-baseline:
    name: OWASP ZAP baseline
    runs-on: ubuntu-latest
    # On a Deploy-triggered run, only scan if the deploy actually succeeded.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - name: ZAP baseline scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: https://myawardtracker.com
          cmd_options: '-a'
          fail_action: false
